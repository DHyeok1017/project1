<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>대학교 공지사항 게시판</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- CSS 연결 -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>📢 대학교 공지사항 게시판</h1>
  </header>

  <main>
    <!-- 학교 사진 -->
    <section id="school-info">
      <h2>우리 학교</h2>
      <img src="images/school.jpg" alt="학교 전경 사진" width="400">
      <p>
        <a href="https://dcs-learning.cnu.ac.kr" target="_blank">학교 공식 홈페이지 바로가기</a>
      </p>
    </section>

    <!-- 공지사항 등록 폼 -->
    <section id="notice-form">
      <h2>공지사항 등록</h2>
      <form id="form">
        <div class="form-group">
          <label for="title">제목</label>
          <input type="text" id="title" name="title" placeholder="제목을 입력하세요" required>
        </div>

        <div class="form-group">
          <label for="content">내용</label>
          <textarea id="content" name="content" placeholder="내용을 입력하세요" required></textarea>
        </div>

        <button type="submit">등록하기</button>
      </form>
    </section>

    <!-- 공지사항 목록 -->
    <section id="notice-board">
      <h2>공지사항 목록</h2>
      <ul id="notice-list">
        <!-- JS에서 공지사항이 추가됩니다 -->
      </ul>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 대학교 게시판</p>
  </footer>

  <!-- JS 연결 -->
  <script src="js/script.js"></script>
</body>
</html>
